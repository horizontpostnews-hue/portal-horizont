name: Executar Robo de Noticias

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rodar-script:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar codigo do repositorio
        uses: actions/checkout@v3

      - name: Configurar o Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar ferramentas necessarias
        run: |
          pip install -r requirements.txt

      - name: Executar Robo
        timeout-minutes: 15  # <--- DA MAIS TEMPO PARA O ROBÔ TRADUZIR TUDO
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python cron_script.py

      - name: Salvar alteracoes no banco de dados
        run: |
          git config --global user.name "Robo Horizont"
          git config --global user.email "actions@github.com"
          touch banco_noticias.json
          git add banco_noticias.json || true
          git commit -m "database: atualizacao automatica de noticias globais [skip ci]" || true
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main || true
